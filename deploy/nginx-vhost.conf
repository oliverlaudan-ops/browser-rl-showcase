# Nginx vhost for rl-showcase.future-pulse.de
# Statische Vite-Build-Output, kein Container/Backend nötig
#
# Install:
#   1. Build: `npm run build` → dist/
#   2. Copy: `sudo cp -r dist/* /var/www/rl-showcase/`
#   3. Copy this file: `sudo cp deploy/nginx-vhost.conf /etc/nginx/sites-available/rl-showcase.future-pulse.de`
#   4. Enable: `sudo ln -s /etc/nginx/sites-available/rl-showcase.future-pulse.de /etc/nginx/sites-enabled/`
#   5. SSL: `sudo certbot --nginx -d rl-showcase.future-pulse.de`
#   6. Reload: `sudo nginx -t && sudo systemctl reload nginx`

server {
    server_name rl-showcase.future-pulse.de;

    # ACME challenge (wird von certbot --nginx genutzt)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Statische Files direkt aus /var/www/rl-showcase/ servieren
    root /var/www/rl-showcase;
    index index.html;

    # SPA-Fallback: alles was nicht als Datei existiert → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Busting: gehashte Assets lange cachen
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML nie cachen (sonst sieht man nach Deploy alte Version)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Sicherheits-Header
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # TF.js nutzt SharedArrayBuffer für WebGL-Backend (optional, performance boost)
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/rl-showcase.future-pulse.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/rl-showcase.future-pulse.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    server_name rl-showcase.future-pulse.de;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
